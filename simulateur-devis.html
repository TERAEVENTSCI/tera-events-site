function QtySelector({value, onChange, min, max, label, unitPrice, discount, accent=C.rose}) {
  const disc = Math.round(unitPrice * (1 - discount));
  return (
    <div style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:8}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <div style={{fontSize:13,fontWeight:500,color:C.cream,fontFamily:"'Poppins',sans-serif"}}>{label}</div>
          <div style={{fontSize:10,color:C.mutedLight,marginTop:2}}>
            {fcfa(unitPrice)}/pers{discount>0 && <span style={{color:C.green}}> → {fcfa(disc)}/pers</span>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center"}}>
          {[{op:"-",fn:()=>onChange(Math.max(min,value-1)),dis:value<=min},{op:"+",fn:()=>onChange(Math.min(max,value+1)),dis:value>=max}].map(({op,fn,dis},i) => (
            <button key={i} onClick={fn} style={{
              width:36,height:36,borderRadius:i===0?"8px 0 0 8px":"0 8px 8px 0",
              background:dis?"#0A1540":`${accent}22`,
              border:`1.5px solid ${dis?"#162060":accent}`,
              color:dis?C.muted:accent, fontSize:20, fontWeight:700,
              cursor:dis?"not-allowed":"pointer",
              display:"flex",alignItems:"center",justifyContent:"center",
            }}>{op}</button>
          ))}
          <div style={{width:46,height:36,display:"flex",alignItems:"center",justifyContent:"center",background:C.card,borderTop:`1.5px solid ${C.border}`,borderBottom:`1.5px solid ${C.border}`,fontSize:18,fontWeight:700,color:value>min?accent:C.mutedLight,fontFamily:"monospace"}}>{value}</div>
        </div>
      </div>
      {value>0 && (
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:`1px solid ${C.border}`}}>
          <span style={{fontSize:10,color:C.muted}}>{value} × {fcfa(disc)}/pers</span>
          <span style={{fontSize:13,fontWeight:700,color:accent,fontFamily:"monospace"}}>{fcfa(disc*value)}/pers (menu)</span>
        </div>
      )}
    </div>
  );
}

// ══ STEP 0 — ÉVÉNEMENT ════════════════════════════════════════════════

// ══ STEP 2 — TRAITEUR ═════════════════════════════════════════════════

  const hasSalle = salleChoice==="seule"||salleChoice==="logistique";
  const discount = hasSalle ? repasDiscount(nbGuests) : 0;
  const pD = Math.round(6000*(1-discount)), pE = Math.round(3500*(1-discount));
  const totalPers = nbPlats*pD + nbEntrees*pE;
  const showApero = ["apero","both"].includes(traiteurChoice);
  const showRepas = ["repas","both"].includes(traiteurChoice);

  return (
    <div>
      <SecTitle sub="Choisissez votre prestation culinaire">Service Traiteur</SecTitle>

        {[
          {id:"none", emoji:"🚫",label:"Pas de traiteur"},
          {id:"apero",emoji:"🥂",label:"Formule Apéritoire",  desc:"Pièces cocktail"},
          {id:"repas",emoji:"🍽️",label:"Repas Assis",         desc:"Plats chauds à table"},

              {o.desc && <div style={{fontSize:10,color:C.muted,marginTop:2}}>{o.desc}</div>}
            </div>
          </Card>

          <Lbl>🥂 Formule Apéritoire</Lbl>

          <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:8}}>
            {FORMULAS.map((f,fi)=>(
              <Card key={f.id} selected={formulaIdx===fi} onClick={()=>setFormulaIdx(fi)} accent={f.accent}>

                  <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
                    <span style={{fontSize:20}}>{f.emoji}</span>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:formulaIdx===fi?f.accent:C.cream,fontFamily:"'Cormorant Garamond',serif",letterSpacing:1}}>FORMULE {f.label}</div>
                      <div style={{fontSize:10,color:C.mutedLight}}>{f.tagline} · {f.pieces} choix/pers</div>
                      <div style={{fontSize:9,color:C.green,marginTop:2}}>✓ {f.note}</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:14,fontWeight:700,color:f.accent,fontFamily:"monospace"}}>{discount>0?fcfa(Math.round(f.pvMin*(1-discount))):fcfa(f.pvMin)}/pers</div>

                  </div>
                </div>
                {formulaIdx===fi && (
                  <div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${f.accent}30`,fontSize:10,color:C.mutedLight,fontFamily:"'Poppins',sans-serif",fontWeight:300}}>
                    {f.categories}
                  </div>
                )}

            ))}
          </div>
        </>
      )}

      {showRepas && (
        <>
          {showApero && <Divider/>}
          <Lbl>🍽️ Repas Assis — Composez votre menu</Lbl>
          {discount>0 && <div style={{padding:"8px 12px",marginBottom:14,background:"#4ADE8010",border:"1px solid #4ADE8040",borderRadius:8,fontSize:11,color:C.green,fontFamily:"'Poppins',sans-serif"}}>🏷️ Remise {discount*100}% appliquée ({nbGuests} invités)</div>}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <Lbl style={{marginBottom:0}}>🥗 Entrées (optionnelles)</Lbl>

          </div>
          <div style={{background:`${C.rose}12`,border:`1px solid ${C.rose}`,borderRadius:10,padding:"14px 16px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
              <div style={{background:C.card,borderRadius:8,padding:"10px 12px",border:`1px solid ${C.border}`}}>
                <div style={{fontSize:9,color:C.muted}}>Plats ({nbPlats}×)</div>
                <div style={{fontSize:13,fontWeight:700,color:C.rose,fontFamily:"monospace"}}>{fcfa(nbPlats*pD)}/pers</div>
              </div>
              <div style={{background:C.card,borderRadius:8,padding:"10px 12px",border:`1px solid ${C.border}`,opacity:nbEntrees===0?0.4:1}}>
                <div style={{fontSize:9,color:C.muted}}>Entrées ({nbEntrees}×)</div>
                <div style={{fontSize:13,fontWeight:700,color:C.blue,fontFamily:"monospace"}}>{fcfa(nbEntrees*pE)}/pers</div>

                <div style={{fontSize:10,color:C.muted}}>Total {nbGuests} invités</div>
                <div style={{fontSize:22,fontWeight:300,color:C.roseLight,fontFamily:"'Cormorant Garamond',serif"}}>{fcfa(totalPers*nbGuests)}</div>

            </div>
          </div>

              {icon:"🤵",label:"Serveurs",val:nbServeurs(nbGuests)},
              {icon:"💧",label:"Jus inclus",val:`${nbTables(nbGuests)*2} btls`},
            ].map(s=>(
              <div key={s.label} style={{background:C.bg,borderRadius:8,padding:10,textAlign:"center",border:`1px solid ${C.border}`}}>
                <div style={{fontSize:14}}>{s.icon}</div>
                <div style={{fontSize:13,fontWeight:600,color:C.cream,fontFamily:"monospace"}}>{s.val}</div>
                <div style={{fontSize:9,color:C.muted,marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>

      {traiteurChoice && traiteurChoice!=="none" && (
        <>
          <Divider/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <Lbl style={{marginBottom:0}}>🍹 Bar à Cocktail (optionnel)</Lbl>
            <Badge color={C.rose}>+/pers</Badge>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            <Card selected={barChoice===null} onClick={()=>setBarChoice(null)} accent={C.muted}>
              <div style={{fontSize:12,color:barChoice===null?C.roseLight:C.mutedLight,fontFamily:"'Poppins',sans-serif"}}>🚫 Pas de bar à cocktail</div>
            </Card>
            {BAR_OPTIONS.map(b=>(
              <Card key={b.id} selected={barChoice===b.id} onClick={()=>setBarChoice(barChoice===b.id?null:b.id)} accent={b.accent}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>

                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>= {fcfa(b.price*nbGuests)}</div>

// ══ STEP 3 — DÉCORATION ═══════════════════════════════════════════════
function StepDeco({decoEnabled,setDecoEnabled,decoSelected,setDecoSelected,plannerChoice,setPlannerChoice,nbGuests,eventType}) {
  const tables = nbTables(nbGuests);
  const honoraires = honorairesDeco(nbGuests);
  const isExt = nbGuests > 100;

  const toggle = (itemId,secId,maxSelect) => {
    setDecoSelected(prev => {
      const next={...prev};
      if(next[itemId]){delete next[itemId];return next;}
      if(maxSelect===1){const s=DECO_SECTIONS.find(s=>s.id===secId);if(s)s.items.forEach(i=>delete next[i.id]);}
      next[itemId]=true; return next;
    });
  };
  const allItems = DECO_SECTIONS.flatMap(s=>s.items);
  const totalItems = Object.keys(decoSelected).reduce((sum,id)=>{
    const item=allItems.find(i=>i.id===id); if(!item) return sum;
    return sum+(item.unit==="table"?item.price*tables:item.unit==="personne"?item.price*nbGuests:item.price);
  },0);

  return (
    <div>
      <SecTitle sub="Personnalisez l'ambiance de votre événement">Décoration</SecTitle>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:24}}>
        {[{id:"oui",emoji:"✨",label:"Oui, je veux une décoration"},{id:"non",emoji:"🚫",label:"Non merci"}].map(o=>(
          <Card key={o.id} selected={decoEnabled===o.id} onClick={()=>setDecoEnabled(o.id)}>
            <div style={{textAlign:"center",padding:"6px 0"}}>
              <div style={{fontSize:22,marginBottom:4}}>{o.emoji}</div>
              <div style={{fontSize:12,fontWeight:500,color:decoEnabled===o.id?C.roseLight:C.cream,fontFamily:"'Poppins',sans-serif"}}>{o.label}</div>
            </div>
          </Card>
        ))}
      </div>

      {decoEnabled==="oui" && (
        <>
          <div style={{padding:"10px 14px",background:`${C.rose}10`,border:`1px solid ${C.rose}30`,borderRadius:8,marginBottom:20,fontSize:11,color:C.roseLight,fontFamily:"'Poppins',sans-serif",fontWeight:300}}>
            ℹ️ Honoraires décoration inclus automatiquement : <strong>{fcfa(honoraires)}</strong> (main d'œuvre, transport, pose & dépose)
          </div>
          {DECO_SECTIONS.filter(sec=>!sec.eventTypes||sec.eventTypes.includes(eventType)).map(sec=>(
            <div key={sec.id} style={{marginBottom:20}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div>
                  <div style={{fontSize:13,fontWeight:400,color:C.cream,fontFamily:"'Cormorant Garamond',serif",letterSpacing:0.5}}>{sec.title}</div>
                  {sec.subtitle && <div style={{fontSize:9,color:C.muted,marginTop:1}}>{sec.subtitle}</div>}
                </div>
                {sec.maxSelect===1 && <Badge color={C.muted}>1 choix max</Badge>}
              </div>
              <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                {sec.items.map((item,idx)=>{
                  const checked=!!decoSelected[item.id];
                  const cost=item.unit==="table"?item.price*tables:item.unit==="personne"?item.price*nbGuests:item.price;
                  const unitDisp=item.unit==="table"?`${fcfa(item.price)}/table · total ${fcfa(cost)}`:item.unit==="personne"?`${fcfa(item.price)}/pers · total ${fcfa(cost)}`:null;
                  return (
                    <div key={item.id} onClick={()=>toggle(item.id,sec.id,sec.maxSelect)} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",cursor:"pointer",background:checked?`${C.rose}08`:"transparent",borderBottom:idx<sec.items.length-1?`1px solid ${C.border}`:"none",transition:"background 0.15s"}}>
                      <div style={{width:16,height:16,flexShrink:0,borderRadius:sec.maxSelect===1?"50%":4,border:`2px solid ${checked?C.rose:C.muted}`,background:checked?C.rose:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:"#000",transition:"all 0.15s"}}>{checked?"✓":""}</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,color:C.cream,fontFamily:"'Poppins',sans-serif",fontWeight:400}}>{item.label}</div>
                        {item.sub && <div style={{fontSize:9,color:C.muted,marginTop:1}}>{item.sub}</div>}
                        {unitDisp && <div style={{fontSize:9,color:C.muted,marginTop:1}}>{unitDisp}</div>}
                      </div>
                      <div style={{fontSize:11,color:checked?C.roseLight:C.mutedLight,fontFamily:"monospace",fontWeight:600}}>{fcfa(item.price)}{item.unit!=="fixe"?`/${item.unit}`:""}</div>
                    </div>
                  );
                })}
              </div>
            </div>
          ))}
          {Object.keys(decoSelected).length>0 && (
            <div style={{background:`${C.rose}15`,border:`1px solid ${C.rose}`,borderRadius:10,padding:"14px 16px",marginTop:8}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:10,color:C.muted}}>Sous-total décoration</div>
                  <div style={{fontSize:11,color:C.mutedLight,marginTop:2}}>+ {fcfa(honoraires)} honoraires</div>
                </div>

        {discount>0 && <div style={{marginTop:10,padding:"6px 10px",background:"#4ADE8015",borderRadius:6,display:"inline-block"}}><span style={{fontSize:10,color:"#4ADE80",fontFamily:"'Poppins',sans-serif"}}>🏷️ Remise {discount*100}% appliquée</span></div>}
        <div style={{fontSize:9,color:C.muted,marginTop:8,fontFamily:"'Poppins',sans-serif"}}>Devis estimatif non contractuel · Sous réserve de disponibilités</div>
      </div>

      {salleChoice&&salleChoice!=="none" && (
        <Section icon="🏛️" label="Espace & Salle">
          <Row label={salleChoice==="seule"?"Salle seule":"Salle + Logistique"} sub={salleChoice==="seule"?"Salle + sono + ingénieur son + groupe électrogène (sans tables ni mobilier)":`Salle + tables, chaises, nappes, vaisselle + sono + ingé son + groupe électrogène · ${tables} tables`} amount={fcfa(salleBase)}/>
          {salleDiscAmt>0 && <Row label="🏷️ Remise service additionnel −20%" amount={`− ${fcfa(salleDiscAmt)}`}/>}
          <Row label="Sous-total Salle" amount={fcfa(salleCost)} accent isTotal/>
        </Section>
      )}

      {traiteurChoice&&traiteurChoice!=="none" && (
        <Section icon="🍽️" label="Service Traiteur">
          {aperoCost>0&&formulaIdx!==null && (
            <Row label={`Formule ${FORMULAS[formulaIdx].label}`}
              sub={`${fcfa(FORMULAS[formulaIdx].pvMin)}/pers${discount>0?` −${discount*100}%`:""}  × ${nbGuests} · ${FORMULAS[formulaIdx].pieces} choix/pers`}
              amount={fcfa(aperoCost)}/>
          )}
          {repasCost>0 && (
            <Row label={`Repas assis — ${nbPlats} plat${nbPlats>1?"s":""}${nbEntrees>0?` + ${nbEntrees} entrée${nbEntrees>1?"s":""}`:""}`}
              sub={`${fcfa(nbPlats*6000+nbEntrees*3500)}/pers${discount>0?` −${discount*100}%`:""} × ${nbGuests} · ${nbServeurs(nbGuests)} serveurs · Eau + jus inclus`}
              amount={fcfa(repasCost)}/>
          )}
          {barCost>0&&barData && (
            <Row label={`Bar — ${barData.label}`}
              sub={`${fcfa(barData.price)}/pers × ${nbGuests} invités`}
              amount={fcfa(barCost)}/>
          )}
          <Row label="Sous-total Traiteur" amount={fcfa(aperoCost+repasCost+barCost)} accent isTotal/>
        </Section>
      )}

      {hasDecoItems && (
        <Section icon="🌸" label="Décoration">
          {Object.keys(decoSelected).filter(k=>k!=="__perso").map(id=>{
            const item=allDecoItems.find(i=>i.id===id); if(!item) return null;
            const cost=item.unit==="table"?item.price*tables:item.unit==="personne"?item.price*nbGuests:item.price;
            const sub=item.unit==="table"?`${fcfa(item.price)} × ${tables} tables`:item.unit==="personne"?`${fcfa(item.price)} × ${nbGuests} pers.`:null;
            return <Row key={id} label={item.label} sub={sub} amount={fcfa(cost)}/>;
          })}
          <Row label="Honoraires décoration" sub="Main d'œuvre, transport, pose & dépose" amount={fcfa(honoraires)}/>
          {decoSelected.__perso && <Row label="🎨 Décoration personnalisée" sub="Notre équipe vous contactera pour un devis sur-mesure" amount="—"/>}
          <Row label="Sous-total Décoration" amount={fcfa(decoCost)} accent isTotal/>
        </Section>
      )}

      {plannerCost>0&&plannerData && (
        <Section icon={plannerData.emoji} label="Event Planner">
          <Row label={plannerData.label} sub={plannerData.unit} amount={fcfa(plannerData.price)}/>
          <Row label="Sous-total Coordination" amount={fcfa(plannerCost)} accent isTotal/>
        </Section>
      )}

      {/* ══ TOTAL ══ */}
      <div style={{background:`linear-gradient(135deg, #0B2273, #060D2E)`,border:`2px solid ${C.rose}`,borderRadius:12,padding:"22px 20px",marginBottom:24,boxShadow:`0 0 40px ${C.rose}20`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <Lbl style={{marginBottom:4}}>Total Estimatif</Lbl>
            <div style={{fontSize:11,color:C.mutedLight,fontFamily:"'Poppins',sans-serif",fontWeight:300}}>Pour {nbGuests} invités · Non contractuel</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:36,fontWeight:300,color:C.roseLight,fontFamily:"'Cormorant Garamond',serif",lineHeight:1}}>{fcfa(grandTotal)}</div>
            <div style={{fontSize:11,color:C.muted,marginTop:6}}>{fcfa(Math.round(grandTotal/nbGuests))}/invité</div>
          </div>
        </div>
      </div>

      {/* ══ PRINT / DOWNLOAD CTA ══ */}
      <button onClick={openPrintDevis} className="no-print" style={{background:`linear-gradient(135deg, ${C.rose}, ${C.roseLight})`,color:"#000",border:"none",borderRadius:12,padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:12,cursor:"pointer",width:"100%",marginBottom:12,fontFamily:"'Poppins',sans-serif"}}>
        <span style={{fontSize:22}}>📄</span>
        <div style={{textAlign:"left"}}>
          <div style={{fontSize:16,fontWeight:700}}>Télécharger mon devis</div>
          <div style={{fontSize:10,fontWeight:300,opacity:0.7}}>Choisissez "Enregistrer en PDF" dans la fenêtre d'impression</div>
        </div>
      </button>

      {/* ══ WHATSAPP CTA ══ */}
      <a href={`https://wa.me/${WHATSAPP_NUMBER}?text=${buildWhatsAppMsg()}`} target="_blank" rel="noopener noreferrer" className="no-print" style={{textDecoration:"none",display:"block",marginBottom:12}}>
        <div style={{background:"#25D366",borderRadius:12,padding:"18px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:12,cursor:"pointer",boxShadow:"0 4px 20px rgba(37,211,102,0.3)"}}>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          <div style={{textAlign:"left"}}>
            <div style={{color:"white",fontSize:16,fontWeight:700,fontFamily:"'Poppins',sans-serif"}}>Réserver sur WhatsApp</div>
            <div style={{color:"rgba(255,255,255,0.8)",fontSize:10,fontFamily:"'Poppins',sans-serif",fontWeight:300}}>Envoyez votre devis à TERA EVENTS</div>
          </div>
        </div>
      </a>


      {/* ══ CALL CTA ══ */}
      <a href="tel:+2250566221010" className="no-print" style={{textDecoration:"none",display:"block",marginBottom:20}}>
        <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"center",gap:10,cursor:"pointer"}}>
          <span style={{fontSize:20}}>📞</span>
          <div>
            <div style={{color:C.cream,fontSize:13,fontWeight:500,fontFamily:"'Poppins',sans-serif"}}>Appelez-nous : 05 66 22 10 10</div>
            <div style={{color:C.muted,fontSize:10,fontFamily:"'Poppins',sans-serif",fontWeight:300}}>Du lundi au samedi · 9h – 19h</div>

      {/* ══ COORDONNÉES ══ */}
      <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",marginBottom:14}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {[

// ══ MAIN APP ══════════════════════════════════════════════════════════
function DevisSimulator() {
  const [step, setStep]                   = useState(0);
  const [eventType, setEventType]         = useState("");
  const [nbGuests, setNbGuests]           = useState(50);
  const [salleChoice, setSalleChoice]     = useState(null);
  const [traiteurChoice, setTraiteurChoice] = useState(null);
  const [formulaIdx, setFormulaIdx]       = useState(null);
  const [nbPlats, setNbPlats]             = useState(1);
  const [nbEntrees, setNbEntrees]         = useState(0);
  const [barChoice, setBarChoice]         = useState(null);
  const [decoEnabled, setDecoEnabled]     = useState(null);
  const [decoSelected, setDecoSelected]   = useState({});
  const [plannerChoice, setPlannerChoice] = useState(null);
  const [clientName, setClientName]       = useState("");
  const [clientCompany, setClientCompany] = useState("");
  const [clientEmail, setClientEmail]     = useState("");
  const [clientWhatsApp, setClientWhatsApp] = useState("");
  const [clientDate, setClientDate]       = useState("");
  const [isSending, setIsSending]         = useState(false);
  const [sendError, setSendError]         = useState("");

  const tables = nbTables(nbGuests);
  const hasSalle = salleChoice==="seule"||salleChoice==="logistique";
  const discount = hasSalle ? repasDiscount(nbGuests) : 0;

  const aperoCost = useMemo(()=>{
    if(!["apero","both"].includes(traiteurChoice)||formulaIdx===null) return 0;
    const base = FORMULAS[formulaIdx].pvMin*nbGuests;
    return Math.round(base*(1-discount));
  },[traiteurChoice,formulaIdx,nbGuests,discount]);

  const repasCost = useMemo(()=>{
    if(!["repas","both"].includes(traiteurChoice)) return 0;
    return Math.round((nbPlats*6000+nbEntrees*3500)*nbGuests*(1-discount));
  },[traiteurChoice,nbPlats,nbEntrees,nbGuests,discount]);

  const barCost = useMemo(()=>{
    if(!barChoice) return 0;
    const b=BAR_OPTIONS.find(b=>b.id===barChoice);
    return b?b.price*nbGuests:0;
  },[barChoice,nbGuests]);

  const decoItemsCost = useMemo(()=>{
    if(decoEnabled!=="oui") return 0;
    const allItems=DECO_SECTIONS.flatMap(s=>s.items);
    return Object.keys(decoSelected).reduce((sum,id)=>{
      const item=allItems.find(i=>i.id===id); if(!item) return sum;
      return sum+(item.unit==="table"?item.price*tables:item.unit==="personne"?item.price*nbGuests:item.price);
    },0);
  },[decoSelected,decoEnabled,tables,nbGuests]);

  const hasDecoItems = decoEnabled==="oui"&&Object.keys(decoSelected).filter(k=>k!=="__perso").length>0;
  const honoraires   = hasDecoItems?honorairesDeco(nbGuests):0;
  const decoCost     = decoItemsCost+honoraires;

  const plannerCost = useMemo(()=>{
    if(!plannerChoice) return 0;
    const p=EVENT_PLANNER.find(p=>p.id===plannerChoice);
    return p?p.price:0;
  },[plannerChoice]);

  const hasTraiteur = ["apero","repas","both"].includes(traiteurChoice);
  const hasService  = hasTraiteur||hasDecoItems;

  const salleCost = useMemo(()=>{
    if(!salleChoice||salleChoice==="none") return 0;
    if(salleChoice==="seule") return 800000;
    return hasService?800000:1000000;
  },[salleChoice,hasService]);

  const grandTotal = salleCost+aperoCost+repasCost+barCost+decoCost+plannerCost;

  const canProceed = ()=>{
    if(step===0) return eventType&&nbGuests>=30;
    if(step===1) return salleChoice!==null;
    if(step===2){
      if(!traiteurChoice) return false;
      if(traiteurChoice==="none") return true;
      if(["apero","both"].includes(traiteurChoice)) return formulaIdx!==null;
      return true;
    }
    if(step===3) return decoEnabled!==null;
    if(step===4) return clientName.trim().length>=2 && isValidEmail(clientEmail) && isValidWhatsApp(clientWhatsApp);
    return true;
  };

  // ══ ENVOI AUTOMATIQUE DU LEAD ══════════════════════════════════
  const buildLeadSummary = () => {
    const eInfo = EVENT_TYPES.find(e=>e.id===eventType);
    const allDecoItems = DECO_SECTIONS.flatMap(s=>s.items);
    const tbl = nbTables(nbGuests);
    let s = "";
    s += `── ÉVÉNEMENT ──\n`;
    s += `Type : ${eInfo?.label||""}\n`;
    s += `Invités : ${nbGuests}\n`;
    s += `Lieu : ${nbGuests>100?"Espace partenaire":"Salle TERA EVENTS"}\n\n`;
    if(salleChoice&&salleChoice!=="none") s += `── SALLE ──\n${salleChoice==="seule"?"Salle seule":"Salle + Logistique"} — ${fcfa(salleCost)}\n\n`;
    if(aperoCost>0&&formulaIdx!==null) s += `── APÉRO ──\nFormule ${FORMULAS[formulaIdx].label} (${FORMULAS[formulaIdx].pieces} choix) — ${fcfa(aperoCost)}\n\n`;
    if(repasCost>0) s += `── REPAS ──\n${nbPlats} plat(s)${nbEntrees>0?` + ${nbEntrees} entrée(s)`:""} — ${fcfa(repasCost)}\n\n`;
    if(barCost>0){const bd=BAR_OPTIONS.find(b=>b.id===barChoice); s += `── BAR ──\n${bd?.label||""} — ${fcfa(barCost)}\n\n`;}
    if(decoCost>0){
      s += `── DÉCORATION ──\n`;
      Object.keys(decoSelected).filter(k=>k!=="__perso").forEach(id=>{
        const item=allDecoItems.find(i=>i.id===id);
        if(item){
          if(item.unit==="table") s += `• ${item.label} (x${tbl} tables)\n`;
          else if(item.unit==="personne") s += `• ${item.label} (x${nbGuests} pers.)\n`;
          else s += `• ${item.label}\n`;
        }
      });
      if(decoSelected.__perso) s += `• Décoration personnalisée demandée\n`;
      s += `Total décoration : ${fcfa(decoCost)}\n\n`;
    }
    if(plannerCost>0){const pd=EVENT_PLANNER.find(p=>p.id===plannerChoice); s += `── COORDINATION ──\n${pd?.label||""} — ${fcfa(plannerCost)}\n\n`;}
    s += `══════════════════\nTOTAL ESTIMATIF : ${fcfa(grandTotal)}\nSoit ${fcfa(Math.round(grandTotal/nbGuests))}/invité`;
    return s;
  };

  const sendLeadData = async () => {
    setIsSending(true); setSendError("");
    const eInfo = EVENT_TYPES.find(e=>e.id===eventType);

    try {
      const formData = new FormData();
      formData.append("_subject", `📋 Nouveau devis simulateur — ${clientName} — ${eInfo?.label||""} — ${fcfa(grandTotal)}`);
      formData.append("Nom", clientName);
      formData.append("Entreprise", clientCompany||"—");
      formData.append("Email", clientEmail);
      formData.append("WhatsApp", clientWhatsApp);
      formData.append("Date événement", clientDate||"Non précisée");
      formData.append("Type événement", eInfo?.label||"");
      formData.append("Nombre invités", nbGuests);
      formData.append("Total estimatif", fcfa(grandTotal));
      formData.append("Détail du devis", buildLeadSummary());

      const res = await fetch(FORMSPREE_URL, {
        method: "POST",
        body: formData,
        headers: { "Accept": "application/json" },
      });

      if(res.ok){
        setStep(5);
      } else {
        throw new Error("Formspree error");
      }
    } catch(err){
      console.error("Erreur envoi Formspree:",err);
      setSendError("L'envoi a échoué. Vérifiez votre connexion et réessayez.");
      // Fallback : afficher le devis après 3s pour ne pas bloquer
      setTimeout(()=>{setStep(5);setSendError("");},3000);
    }
    setIsSending(false);
  };

  const reset = ()=>{
    setStep(0);setEventType("");setNbGuests(50);setSalleChoice(null);
    setTraiteurChoice(null);setFormulaIdx(null);
    setNbPlats(1);setNbEntrees(0);setBarChoice(null);
    setDecoEnabled(null);setDecoSelected({});setPlannerChoice(null);
    setClientName("");setClientCompany("");setClientEmail("");setClientWhatsApp("");setClientDate("");
    setIsSending(false);setSendError("");
  };

  return (
    <div style={{background:C.bg,minHeight:"100vh",fontFamily:"'Poppins',sans-serif",maxWidth:680,margin:"0 auto"}}>
      <style>{GLOBAL_CSS}</style>

      {/* HEADER */}
      <div className="no-print" style={{background:`linear-gradient(180deg, ${C.navy} 0%, ${C.bg} 100%)`,padding:"24px 20px 0",borderBottom:`1px solid ${C.border}`}}>
        <div style={{textAlign:"center",marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:12}}>
            <TeraLogo size={60}/>
          </div>
          <h1 style={{fontSize:24,fontWeight:400,letterSpacing:4,color:C.cream,fontFamily:"'Cormorant Garamond',serif",lineHeight:1.2}}>
            Tera <span style={{fontStyle:"italic",color:C.rose}}>events</span>
          </h1>
          <div style={{fontSize:9,letterSpacing:4,color:C.muted,marginTop:6,fontFamily:"'Poppins',sans-serif",fontWeight:300}}>SIMULATEUR DE DEVIS</div>
          <p style={{fontSize:11,color:C.mutedLight,marginTop:6,fontFamily:"'Poppins',sans-serif",fontWeight:300,fontStyle:"italic"}}>Estimez votre événement en quelques clics</p>
        </div>

        {/* Steps */}
        <div style={{display:"flex"}}>
          {STEPS.map((s,i)=>(
            <div key={i} onClick={()=>i<step&&setStep(i)} style={{
              flex:1, padding:"10px 4px", textAlign:"center",
              borderTop:`3px solid ${i===step?C.rose:i<step?C.roseDark:"transparent"}`,
              borderBottom:`1px solid ${i===step?"transparent":C.border}`,
              cursor:i<step?"pointer":"default",
              background:i===step?C.bg:"transparent",
            }}>
              <div style={{fontSize:10,fontWeight:600,letterSpacing:1,fontFamily:"monospace",color:i===step?C.rose:i<step?C.roseDark:C.muted}}>{i<step?"✓":i+1}</div>
              <div style={{fontSize:9,color:i===step?C.cream:C.muted,marginTop:1,fontFamily:"'Poppins',sans-serif",fontWeight:300}}>{s}</div>
            </div>
          ))}
        </div>
      </div>

      {/* CONTENT */}
      <div style={{padding:"24px 16px"}}>
        {step>0&&step<5&&grandTotal>0 && (
          <div className="no-print" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",marginBottom:20,background:`${C.rose}10`,border:`1px solid ${C.roseDark}`,borderRadius:8}}>
            <span style={{fontSize:10,color:C.muted,fontFamily:"'Poppins',sans-serif"}}>Estimation en cours</span>
            <span style={{fontSize:15,fontWeight:700,color:C.roseLight,fontFamily:"monospace"}}>{fcfa(grandTotal)}</span>
          </div>
        )}
        {step===0 && <StepEvent eventType={eventType} setEventType={setEventType} nbGuests={nbGuests} setNbGuests={setNbGuests}/>}
        {step===1 && <StepSalle salleChoice={salleChoice} setSalleChoice={setSalleChoice} nbGuests={nbGuests} hasService={hasService}/>}
        {step===2 && <StepTraiteur traiteurChoice={traiteurChoice} setTraiteurChoice={setTraiteurChoice} formulaIdx={formulaIdx} setFormulaIdx={setFormulaIdx} nbPlats={nbPlats} setNbPlats={setNbPlats} nbEntrees={nbEntrees} setNbEntrees={setNbEntrees} barChoice={barChoice} setBarChoice={setBarChoice} nbGuests={nbGuests} salleChoice={salleChoice}/>}
        {step===3 && <StepDeco decoEnabled={decoEnabled} setDecoEnabled={setDecoEnabled} decoSelected={decoSelected} setDecoSelected={setDecoSelected} plannerChoice={plannerChoice} setPlannerChoice={setPlannerChoice} nbGuests={nbGuests} eventType={eventType}/>}
        {step===4 && <StepContact clientName={clientName} setClientName={setClientName} clientCompany={clientCompany} setClientCompany={setClientCompany} clientEmail={clientEmail} setClientEmail={setClientEmail} clientWhatsApp={clientWhatsApp} setClientWhatsApp={setClientWhatsApp} clientDate={clientDate} setClientDate={setClientDate}/>}
        {step===5 && <StepRecap eventType={eventType} nbGuests={nbGuests} salleChoice={salleChoice} traiteurChoice={traiteurChoice} formulaIdx={formulaIdx} nbPlats={nbPlats} nbEntrees={nbEntrees} barChoice={barChoice} decoEnabled={decoEnabled} decoSelected={decoSelected} plannerChoice={plannerChoice} salleCost={salleCost} aperoCost={aperoCost} repasCost={repasCost} barCost={barCost} decoCost={decoCost} plannerCost={plannerCost} grandTotal={grandTotal} hasService={hasService} clientName={clientName} clientCompany={clientCompany} clientEmail={clientEmail} clientWhatsApp={clientWhatsApp} clientDate={clientDate}/>}
      </div>

      {/* NAVIGATION */}
      <div className="no-print" style={{position:"sticky",bottom:0,background:`linear-gradient(0deg, ${C.navy} 80%, transparent)`,padding:"16px 16px 20px",display:"flex",flexDirection:"column",gap:8,alignItems:"center"}}>
        {sendError && <div style={{width:"100%",padding:"8px 12px",background:"#F8717115",border:"1px solid #F8717130",borderRadius:8,fontSize:10,color:"#F87171",fontFamily:"'Poppins',sans-serif",textAlign:"center"}}>{sendError}</div>}

        {isSending && (
          <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 20px"}}>
            <div style={{width:18,height:18,border:"2px solid #DCA19D40",borderTop:"2px solid #DCA19D",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
            <span style={{fontSize:12,color:C.roseLight,fontFamily:"'Poppins',sans-serif"}}>Envoi de vos coordonnées en cours...</span>
          </div>
        )}

        {!isSending && (
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:12,width:"100%"}}>
            {step>0&&step<5
              ? <button onClick={()=>setStep(s=>s-1)} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.mutedLight,borderRadius:8,padding:"11px 20px",cursor:"pointer",fontSize:12,fontFamily:"'Poppins',sans-serif"}}>← Retour</button>
              : <div/>
            }
            {step<4 ? (
              <button onClick={()=>setStep(s=>s+1)} disabled={!canProceed()} style={{
                flex:1, maxWidth:240,
                background:canProceed()?`linear-gradient(135deg, ${C.rose}, ${C.roseLight})`:C.border,
                color:canProceed()?"#000":C.muted,
                border:"none",borderRadius:8,padding:"12px 24px",
                cursor:canProceed()?"pointer":"not-allowed",
                fontSize:13,fontWeight:600,fontFamily:"'Poppins',sans-serif",letterSpacing:0.5,transition:"all 0.2s",
              }}>Continuer →</button>
            ) : step===4 ? (
              <button onClick={sendLeadData} disabled={!canProceed()} style={{
                flex:1, maxWidth:280,
                background:canProceed()?`linear-gradient(135deg, #4ADE80, #22C55E)`:C.border,
                color:canProceed()?"#000":C.muted,
                border:"none",borderRadius:8,padding:"14px 24px",
                cursor:canProceed()?"pointer":"not-allowed",
                fontSize:14,fontWeight:700,fontFamily:"'Poppins',sans-serif",letterSpacing:0.5,transition:"all 0.2s",
                boxShadow:canProceed()?"0 4px 20px rgba(74,222,128,0.3)":"none",
              }}>✨ Voir mon devis estimatif</button>
            ) : (
              <button onClick={reset} style={{flex:1,maxWidth:240,background:C.card,border:`1px solid ${C.rose}`,color:C.roseLight,borderRadius:8,padding:"12px 24px",cursor:"pointer",fontSize:13,fontFamily:"'Poppins',sans-serif"}}>
                ↺ Nouveau devis
              </button>
            )}
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DevisSimulator />);
  </script>
  <noscript>
    <div style="text-align:center;padding:60px 20px;font-family:sans-serif;color:#DCA19D;background:#060D2E;min-height:100vh;">
      <h2>TERA EVENTS — Simulateur de Devis</h2>
      <p style="color:#6B83BE;margin-top:16px;">Veuillez activer JavaScript pour utiliser le simulateur.</p>
    </div>
  </noscript>
</body>
</html>
